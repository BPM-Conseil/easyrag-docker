# Example reverse-proxy for chat/platform split domains
# - chat.mydomain.com -> default /chat entry
# - platform.mydomain.com -> default /dashboard entry
# - api.mydomain.com -> backend API

upstream easyrag_webapp {
    server 127.0.0.1:7771;
}

upstream easyrag_backend {
    server 127.0.0.1:7772;
}

server {
    listen 80;
    server_name chat.mydomain.com;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://easyrag_webapp/chat;
    }
}

server {
    listen 80;
    server_name platform.mydomain.com;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://easyrag_webapp/dashboard;
    }
}

server {
    listen 80;
    server_name api.mydomain.com;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://easyrag_backend;
    }
}
