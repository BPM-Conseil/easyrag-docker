services:
  backend:
    image: bpmconseil/easyrag-backend:latest
    container_name: easyrag-backend
    restart: unless-stopped
    ports:
      - "7772:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-easyrag}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-easyrag}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOCUMENT_STORAGE_PATH=/data/documents
    volumes:
      - documents-data:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      llm:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # mcp:
  #   image: bpmconseil/easyrag-mcp:latest
  #   container_name: easyrag-mcp
  #   restart: unless-stopped
  #   ports:
  #     - "8765:8765"
  #   environment:
  #     - DATABASE_URL=postgresql://${MCP_DB_USER:-mcp}:${MCP_DB_PASSWORD}@mcp-vector-db:5432/${MCP_DB_NAME:-mcpdb}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   depends_on:
  #     mcp_vector:
  #       condition: service_healthy

  llm:
    image: bpmconseil/easyrag-llm:latest
    container_name: easyrag-llm
    environment:
      PGVECTOR_USER: ${PGVECTOR_USER}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      PGVECTOR_HOST: ${PGVECTOR_HOST}
      PGVECTOR_PORT: ${PGVECTOR_PORT}
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    restart: unless-stopped

  webapp:
    image: bpmconseil/easyrag-webapp:latest
    container_name: easyrag-webapp
    restart: unless-stopped
    ports:
      - "7771:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: easyrag-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-easyrag}
      - POSTGRES_USER=${DATABASE_USER:-easyrag}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-easyrag} -d ${DATABASE_NAME:-easyrag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp_vector:
    image: pgvector/pgvector:pg16
    container_name: mcp-vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${MCP_DB_NAME:-mcpdb}
      - POSTGRES_USER=${MCP_DB_USER:-mcp}
      - POSTGRES_PASSWORD=${MCP_DB_PASSWORD}
    volumes:
      - mcp-vector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MCP_DB_USER:-mcp} -d ${MCP_DB_NAME:-mcpdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: easyrag-redis
    restart: unless-stopped

volumes:
  postgres-data:
  mcp-vector-data:
  documents-data:
