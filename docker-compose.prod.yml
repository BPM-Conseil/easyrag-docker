services:
  backend:
    image: bpmconseil/easyrag-backend:latest
    container_name: easyrag-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_PORT=${DATABASE_PORT}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DOCUMENT_STORAGE_PATH=/data/documents
      - LICENSE_KEY=${LICENSE_KEY:-}
      - NODE_INTERNAL_TOKEN_PRIVATE_KEY=${NODE_INTERNAL_TOKEN_PRIVATE_KEY:-}
    volumes:
      - documents-data:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      llm:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  llm:
    image: bpmconseil/easyrag-llm:latest
    container_name: easyrag-llm
    environment:
      PGVECTOR_USER: ${PGVECTOR_USER}
      PGVECTOR_PASSWORD: ${PGVECTOR_PASSWORD}
      PGVECTOR_HOST: ${PGVECTOR_HOST}
      PGVECTOR_PORT: ${PGVECTOR_PORT}
      PGVECTOR_DATABASE: ${PGVECTOR_DATABASE}
      INTERNAL_LLM_PROVIDER: ${INTERNAL_LLM_PROVIDER:-openai}
      INTERNAL_LLM_API_KEY: ${INTERNAL_LLM_API_KEY:-}
      INTERNAL_EMBEDDING_MODEL: ${INTERNAL_EMBEDDING_MODEL:-}
      SYSTEM_PROMPT_MODEL: ${SYSTEM_PROMPT_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      INTERNAL_TOKEN_PUBLIC_KEY: ${INTERNAL_TOKEN_PUBLIC_KEY:-}
    restart: unless-stopped

  webapp:
    image: bpmconseil/easyrag-webapp:latest
    container_name: easyrag-webapp
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: easyrag-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-easyrag}
      - POSTGRES_USER=${DATABASE_USER:-easyrag}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-easyrag} -d ${DATABASE_NAME:-easyrag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp_vector:
    image: pgvector/pgvector:pg16
    container_name: mcp-vector-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${MCP_DB_NAME:-mcpdb}
      - POSTGRES_USER=${MCP_DB_USER:-mcp}
      - POSTGRES_PASSWORD=${MCP_DB_PASSWORD}
    volumes:
      - mcp-vector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MCP_DB_USER:-mcp} -d ${MCP_DB_NAME:-mcpdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: easyrag-redis
    restart: unless-stopped

volumes:
  postgres-data:
  mcp-vector-data:
  documents-data:
